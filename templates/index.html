<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warranty Prediction Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .metrics {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 20px;
        }
        .metric {
            background: white;
            border-radius: 5px;
            padding: 20px;
            box-shadow: 0 0 10px #ccc;
            flex: 1;
            margin: 0 10px;
            text-align: center;
        }
        #chart {
            width: 100%;
            max-width: 800px;
            height: 400px;
        }
    </style>
</head>
<body>
    <h1>Warranty Prediction Dashboard</h1>
    <div class="container">
        <div class="metrics">
            <div class="metric">
                <h2>Total Predictions</h2>
                <p id="total-predictions">0</p>
            </div>
            <div class="metric">
                <h2>Accuracy</h2>
                <p id="accuracy">0%</p>
            </div>
            <div class="metric">
                <h2>Warnings</h2>
                <p id="warnings">0</p>
            </div>
        </div>
        <div id="chart"></div>
    </div>
    <script>
        // Sample data for the plotly chart
        var data = [
            {
                x: [1, 2, 3, 4],
                y: [10, 15, 13, 17],
                mode: 'lines+markers',
                type: 'scatter'
            }
        ];

        var layout = {
            title: 'Warranty Predictions Over Time',
            xaxis: { title: 'Time' },
            yaxis: { title: 'Predictions' }
        };

        Plotly.newPlot('chart', data, layout);
    </script>
</body>
</html>

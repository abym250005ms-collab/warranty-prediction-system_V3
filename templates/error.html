{% extends "base.html" %}
{% block title %}Dashboard Error{% endblock %}
{% block content %}
<section class="card error-card">
    <h1>Oops! Something went wrong.</h1>
    <p>{{ message }}</p>
    {% if details %}
        <ul>
            {% for item in details %}
                <li>{{ item }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    <p>Please run <code>python main.py</code> and refresh the page.</p>
</section>
{% endblock %}
